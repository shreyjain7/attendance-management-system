{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - Attendance Management System{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-header">
                    <h3 class="card-title mb-0">
                        <i class="bi bi-lock"></i> Secure Login
                    </h3>
                </div>
                <div class="card-body p-5">
                    <form method="post" class="needs-validation">
                        <!-- CSRF Token - Security Protection -->
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="id_username" class="form-label">Username</label>
                            <input type="text" class="form-control form-control-lg" id="id_username" name="username" placeholder="Enter your username" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="id_password" class="form-label">Password</label>
                            <input type="password" class="form-control form-control-lg" id="id_password" name="password" placeholder="Enter your password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </button>
                    </form>
                    
                    <hr>
                    
                    <p class="text-center mb-0">
                        Don't have an account? 
                        <a href="{% url 'register' %}" class="text-decoration-none">
                            <strong>Register here</strong>
                        </a>
                    </p>
                </div>
                <div class="card-footer bg-light">
                    <small class="text-muted">
                        <i class="bi bi-shield-lock"></i> 
                        Your login is protected by Django's secure authentication system.
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
